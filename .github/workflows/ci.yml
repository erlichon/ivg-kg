name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.5"

      - name: Install dev + core dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        run: pytest
